<app-nav-bar [fullInfos]="true"></app-nav-bar>
<mat-divider></mat-divider>

@if (user$ | async; as user) {
<div class="container">

    <section class="user-profil">

        <h1>Profil utilisateur</h1>

        <form [formGroup]="form" (ngSubmit)="modifier()">
            <mat-form-field appearance="outline">
                <mat-label>Nom d'utilisateur</mat-label>
                <input matInput formControlName="username">
            </mat-form-field>
            <mat-form-field appearance="outline">
                <mat-label>Adresse mail</mat-label>
                <input matInput formControlName="email">
            </mat-form-field>
            <mat-form-field appearance="outline">
                <mat-label>Mot de passe</mat-label>
                <input matInput type="password" formControlName="password">
            </mat-form-field>
            <app-bouton texte="Sauvegarder" type="submit"></app-bouton>
            @if (errorMessage) {
                <p class="error" data-testid="error-message">{{errorMessage}}</p>
            }
        </form>

    </section>

    <section class="abonnements">

        <h1>Abonnements</h1>

        <div class="theme-card-list">

            @for (theme of user.themes; track theme.id) {
            <app-theme-card [theme]="theme" buttonText="Se désabonner"
                (buttonAction)="desabonnement(theme.id!)"></app-theme-card>
            }

        </div>

    </section>

</div>
}
