<app-nav-bar [fullInfos]="true"></app-nav-bar>
<mat-divider></mat-divider>

@if (user$ | async; as user) {
<div class="container">

    <section class="user-profil">

        <h1>Profil utilisateur</h1>

        <form>
            <mat-form-field appearance="outline">
                <mat-label>{{user.username}}</mat-label>
                <input matInput>
            </mat-form-field>
            <mat-form-field appearance="outline">
                <mat-label>{{user.email}}</mat-label>
                <input matInput>
            </mat-form-field>
            <mat-form-field appearance="outline">
                <mat-label>Mot de passe</mat-label>
                <input matInput type="password" formControlName="password">
            </mat-form-field>
            <app-bouton texte="Sauvegarder" type="submit"></app-bouton>
        </form>

    </section>

    <section class="abonnements">

        <h1>Abonnements</h1>

        <div class="theme-card-list">

            @for (theme of user.abonnements; track theme.id) {
            <app-theme-card [theme]="theme" buttonText="Se désabonner"></app-theme-card>
            }

        </div>

    </section>

</div>
}
