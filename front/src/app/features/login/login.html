<div class="container">
    <app-nav-bar [fullInfos]="false"></app-nav-bar>
    <mat-divider></mat-divider>
    <mat-icon routerLink="">keyboard_backspace</mat-icon>
    <div class="logo-container">
        <img src="/logo_p6.png" alt="logo" />
    </div>

    <div class="login-content">
        <p>Se connecter</p>

        <form [formGroup]="form" (ngSubmit)="submit()">
            <mat-form-field appearance="outline">
                <mat-label>E-mail ou nom d'utilisateur</mat-label>
                <input matInput formControlName="identifiant">
            </mat-form-field>
            <mat-form-field appearance="outline">
                <mat-label>Mot de passe</mat-label>
                <input matInput type="password" formControlName="password">
            </mat-form-field>
            <app-bouton texte="Se connecter" type="submit" [disable]="form.invalid" data-testid="submit_button"></app-bouton>
            @if (errorMessage) {
                <p class="error" data-testid="error-message">{{errorMessage}}</p>
            }
        </form>

    </div>
</div>
