<div class="container">
    <app-nav-bar [fullInfos]="false"></app-nav-bar>
    <mat-divider></mat-divider>
    <mat-icon routerLink="">keyboard_backspace</mat-icon>
    <div class="logo-container">
        <img src="/logo_p6.png" alt="logo" />
    </div>

    <div class="login-content">
        <p>S'inscrire</p>

        <form [formGroup]="form" (ngSubmit)="submit()">
            <mat-form-field appearance="outline">
                <mat-label>Nom d'utilisateur</mat-label>
                <input matInput formControlName="username">
            </mat-form-field>
            <mat-form-field appearance="outline">
                <mat-label>Adresse e-mail</mat-label>
                <input matInput formControlName="email">
            </mat-form-field>
            <mat-form-field appearance="outline">
                <mat-label>Mot de passe</mat-label>
                <input matInput type="password" formControlName="password">
            </mat-form-field>
            <app-bouton texte="S'inscrire" type="submit" [disable]="form.invalid"></app-bouton>
            @if (onError) {
                <p class="error" data-testid="error-message">An error occurred</p>
            }
        </form>

    </div>
</div>
