<mat-card>
    <mat-card-header class="header">
        <mat-card-title>{{article.titre}}</mat-card-title>
        <mat-card-subtitle class="article-infos">
            <p>{{article.date}}</p>
            <p>{{article.auteur}}</p>
        </mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
        <p>{{article.texte}}</p>
    </mat-card-content>
</mat-card>
